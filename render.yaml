services:
  - type: web
    name: iota-bot
    runtime: python
    plan: free
    buildCommand: pip install -r iota/requirements.txt && python3 -c "import sys; sys.path.insert(0,'iota'); from utils.font_manager import ensure_fonts; ensure_fonts()"
    startCommand: sh start.sh
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "8080"
