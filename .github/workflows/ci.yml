name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iota
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes pytest python-telegram-bot

      - name: Lint (pyflakes — gated on owned files)
        run: |
          # Block the build only on files we author/maintain. The full tree
          # still carries legacy unused-import warnings (tech debt) reported
          # below as a non-blocking note.
          set -e
          pyflakes utils/ratelimit.py utils/callback_codec.py \
                   utils/config_check.py utils/game_lobby.py \
                   handlers/whisper.py bot.py
          echo "✅ Owned files are lint-clean."

      - name: Lint report (full tree, non-blocking)
        run: |
          pyflakes handlers utils webapp > /tmp/pyflakes_full.txt 2>&1 || true
          echo "Full-tree pyflakes warnings: $(wc -l < /tmp/pyflakes_full.txt)"

      - name: Generate config from template
        run: cp config_template.py config.py
        env:
          BOT_TOKEN: dummy
          MONGO_URI: mongodb://localhost:27017

      - name: Run tests
        run: python -m pytest tests -q || python -m unittest discover -s tests -t . -v
        env:
          BOT_TOKEN: dummy
          MONGO_URI: mongodb://localhost:27017
